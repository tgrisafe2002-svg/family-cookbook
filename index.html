<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Grisafe Collection | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #c2410c; --paper: #fdfcfb; --ink: #1c1917; }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(253, 252, 251, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .page { transition: all 0.4s ease; }
        .hidden { display: none !important; }
        input, textarea, select { background: transparent; border-bottom: 1px solid #e7e5e4; padding: 12px 0; outline: none; width: 100%; transition: border-color 0.3s; }
        input:focus, textarea:focus { border-color: var(--brand); }
        .recipe-content { white-space: pre-wrap; }
        .folder-card { transition: all 0.3s ease; border: 1px solid #e7e5e4; background: white; cursor: pointer; }
        .folder-card:hover { transform: translateY(-5px); border-color: var(--brand); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .syncing { animation: pulse 1.5s infinite; pointer-events: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="glass sticky top-0 z-[100] border-b border-stone-200/50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4 cursor-pointer" onclick="navigateTo('library')">
                <div class="w-10 h-10 bg-stone-900 rounded-xl flex items-center justify-center text-white serif font-bold text-xl shadow-lg">G</div>
                <h1 class="serif text-xl font-bold italic hidden md:block">The Grisafe Collection</h1>
            </div>
            <div id="sync-indicator" class="text-[10px] font-bold text-orange-600 uppercase tracking-widest hidden">Syncing...</div>
            <button onclick="openAddForm()" class="bg-stone-900 text-white px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-orange-700 active:scale-95 transition-all">
                + New Entry
            </button>
        </div>
    </nav>

    <main id="view-library" class="page max-w-7xl mx-auto px-6 py-12 md:py-20">
        <h2 class="serif text-5xl md:text-7xl mb-12">Volumes</h2>
        <div id="category-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <main id="view-folder" class="page max-w-7xl mx-auto px-6 py-12 hidden">
        <button onclick="navigateTo('library')" class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-4">← Library</button>
        <h2 id="current-folder-title" class="serif text-5xl italic font-bold capitalize mb-8"></h2>
        <div id="recipe-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <main id="view-recipe" class="page max-w-5xl mx-auto px-6 py-12 hidden">
        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-stone-100 overflow-hidden">
            <div class="bg-stone-900 p-12 text-center text-white"><h2 id="detail-name" class="serif text-4xl italic"></h2></div>
            <div class="p-8 md:p-16">
                <div class="flex justify-between mb-8 border-b pb-4">
                    <div class="flex gap-4"><span id="detail-calories" class="text-[10px] font-black text-orange-600 tracking-widest"></span><span id="detail-yields" class="text-[10px] font-black text-stone-400 tracking-widest"></span></div>
                    <div class="flex gap-4">
                        <button id="edit-btn" class="text-[10px] font-bold text-stone-400 uppercase">Edit</button>
                        <button id="delete-btn" class="text-[10px] font-bold text-red-200 hover:text-red-500 uppercase">Delete</button>
                    </div>
                </div>
                <div class="grid md:grid-cols-3 gap-12">
                    <div><h3 class="serif font-bold border-b mb-4">Ingredients</h3><div id="detail-ingredients" class="recipe-content text-sm text-stone-600"></div></div>
                    <div class="md:col-span-2"><h3 class="serif font-bold border-b mb-4">Directions</h3><div id="detail-directions" class="recipe-content text-stone-700"></div></div>
                </div>
                <div id="detail-notes-container" class="mt-12 p-6 bg-stone-50 rounded-xl hidden italic text-sm text-stone-500"></div>
            </div>
        </div>
    </main>

    <main id="view-form" class="page max-w-4xl mx-auto px-6 py-12 hidden">
        <div class="bg-white p-8 md:p-16 rounded-[2.5rem] shadow-2xl border border-stone-100">
            <h2 id="form-title" class="serif text-4xl mb-12">New Entry</h2>
            <input type="hidden" id="form-id">
            <div class="space-y-8">
                <input id="form-name" type="text" placeholder="Recipe Name">
                <div class="grid md:grid-cols-2 gap-8">
                    <select id="form-category-select" onchange="toggleNewCat(this.value)"></select>
                    <input id="form-category-new" type="text" placeholder="New Category Name" class="hidden">
                </div>
                <div class="grid grid-cols-2 gap-8">
                    <input id="form-calories" type="text" placeholder="Calories">
                    <input id="form-yields" type="text" placeholder="Yields">
                </div>
                <textarea id="form-ingredients" rows="6" placeholder="Ingredients"></textarea>
                <textarea id="form-directions" rows="6" placeholder="Directions"></textarea>
                <textarea id="form-notes" rows="2" placeholder="Notes"></textarea>
                <button id="save-btn" onclick="saveRecipe()" class="w-full bg-stone-900 text-white py-6 rounded-2xl font-bold uppercase tracking-widest text-[10px]">Sync to Family Cloud</button>
            </div>
        </div>
    </main>

    <script>
        const BIN_ID = '69b8a763b7ec241ddc7544fd'; 
        const API_KEY = '$2a$10$VHX5GeiEk3k8eEuTZyyJyeMyEh.Zjbuq5QmaBw0070hEyMBRRF5Su';
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let recipes = [];

        async function syncCloud(dataToSave = null) {
            const indicator = document.getElementById('sync-indicator');
            indicator.classList.remove('hidden');
            
            try {
                if (dataToSave) {
                    // SAVE MODE
                    await fetch(URL, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                        body: JSON.stringify(dataToSave)
                    });
                    recipes = dataToSave;
                } else {
                    // LOAD MODE
                    const response = await fetch(URL + '/latest', {
                        headers: { 'X-Master-Key': API_KEY }
                    });
                    const result = await response.json();
                    // Handle different JSONBin structures
                    recipes = result.record.record || result.record || [];
                }
                renderLibrary();
            } catch (e) {
                console.error("Cloud Error:", e);
                // Fallback: If cloud fails, try to load from local storage
                recipes = JSON.parse(localStorage.getItem('grisafe_backup') || '[]');
                renderLibrary();
            }
            indicator.classList.add('hidden');
        }

        function navigateTo(view) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            const target = document.getElementById('view-' + view);
            if(target) target.classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function renderLibrary() {
            const grid = document.getElementById('category-grid');
            if (!recipes || recipes.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 border-2 border-dashed rounded-3xl text-stone-300 italic">Vault is empty. Add your first recipe!</div>';
                return;
            }
            const cats = [...new Set(recipes.map(r => r.category))].sort();
            grid.innerHTML = cats.map(cat => `
                <div onclick="openFolder('${cat}')" class="folder-card p-10 rounded-3xl">
                    <h3 class="serif text-3xl font-bold capitalize mb-2">${cat}</h3>
                    <p class="text-[10px] font-black text-orange-600 uppercase">${recipes.filter(r => r.category === cat).length} Manuscripts</p>
                </div>`).join('');
        }

        function openFolder(cat) {
            navigateTo('folder');
            document.getElementById('current-folder-title').innerText = cat;
            const filtered = recipes.filter(r => r.category === cat);
            document.getElementById('recipe-grid').innerHTML = filtered.map(r => `
                <div onclick="openRecipe(${r.id})" class="bg-white p-8 rounded-[2rem] border border-stone-100 shadow-sm cursor-pointer hover:shadow-xl transition-all">
                    <h4 class="serif text-2xl">${r.name}</h4>
                </div>`).join('');
        }

        function openRecipe(id) {
            const r = recipes.find(x => x.id === id);
            if(!r) return;
            navigateTo('recipe');
            document.getElementById('detail-name').innerText = r.name;
            document.getElementById('detail-ingredients').innerText = r.ingredients;
            document.getElementById('detail-directions').innerText = r.directions;
            document.getElementById('detail-calories').innerText = r.calories ? r.calories + ' CAL' : '';
            document.getElementById('detail-yields').innerText = r.yields ? 'SERVES ' + r.yields : '';
            const n = document.getElementById('detail-notes-container');
            if(r.notes) { n.innerText = r.notes; n.classList.remove('hidden'); } else { n.classList.add('hidden'); }
            
            document.getElementById('edit-btn').onclick = () => editRecipe(r.id);
            document.getElementById('delete-btn').onclick = () => deleteRecipe(r.id);
        }

        async function saveRecipe() {
            const btn = document.getElementById('save-btn');
            btn.classList.add('syncing');
            const id = document.getElementById('form-id').value;
            const sel = document.getElementById('form-category-select').value;
            const cat = sel === 'NEW' ? document.getElementById('form-category-new').value : sel;
            
            if(!cat || !document.getElementById('form-name').value) {
                alert("Name and Category are required.");
                btn.classList.remove('syncing');
                return;
            }

            const r = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('form-name').value,
                category: cat,
                calories: document.getElementById('form-calories').value,
                yields: document.getElementById('form-yields').value,
                ingredients: document.getElementById('form-ingredients').value,
                directions: document.getElementById('form-directions').value,
                notes: document.getElementById('form-notes').value
            };

            const updated = id ? recipes.map(x => x.id === parseInt(id) ? r : x) : [...recipes, r];
            
            // Backup locally just in case
            localStorage.setItem('grisafe_backup', JSON.stringify(updated));
            
            await syncCloud(updated);
            btn.classList.remove('syncing');
            navigateTo('library');
        }

        async function deleteRecipe(id) {
            if(confirm("Permanently delete this recipe from the family vault?")) {
                const updated = recipes.filter(x => x.id !== id);
                await syncCloud(updated);
                navigateTo('library');
            }
        }

        function editRecipe(id) {
            const r = recipes.find(x => x.id === id);
            openAddForm();
            document.getElementById('form-id').value = r.id;
            document.getElementById('form-name').value = r.name;
            document.getElementById('form-calories').value = r.calories;
            document.getElementById('form-yields').value = r.yields;
            document.getElementById('form-ingredients').value = r.ingredients;
            document.getElementById('form-directions').value = r.directions;
            document.getElementById('form-notes').value = r.notes;
            updateDropdown(r.category);
        }

        function openAddForm() {
            document.querySelectorAll('#view-form input, #view-form textarea').forEach(i => i.value = "");
            updateDropdown();
            navigateTo('form');
        }

        function updateDropdown(sel = '') {
            const cats = [...new Set(recipes.map(r => r.category))];
            let h = `<option value="" disabled ${!sel ? 'selected' : ''}>Select Volume</option>`;
            cats.forEach(c => h += `<option value="${c}" ${sel === c ? 'selected' : ''}>${c}</option>`);
            h += `<option value="NEW">+ Create New Volume</option>`;
            document.getElementById('form-category-select').innerHTML = h;
            toggleNewCat(sel === 'NEW' ? 'NEW' : '');
        }

        function toggleNewCat(v) { document.getElementById('form-category-new').classList.toggle('hidden', v !== 'NEW'); }

        // Start the engine
        syncCloud();
    </script>
</body>
</html>
