<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Grisafe Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #c2410c; --paper: #fdfcfb; --ink: #1c1917; }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: var(--ink); margin: 0; padding: 0; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(253, 252, 251, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid #e7e5e4; }
        .page { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .hidden { display: none !important; }
        .folder-card { background: white; border: 1px solid #e7e5e4; padding: 40px; border-radius: 24px; cursor: pointer; text-align: center; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e7e5e4; border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="glass sticky top-0 z-50 p-4 flex justify-between items-center">
        <div onclick="location.reload()" style="cursor:pointer">
            <span class="serif font-bold text-2xl">The Grisafe Collection</span>
        </div>
        <button onclick="openAddForm()" class="bg-stone-900 text-white px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest">
            + New Entry
        </button>
    </nav>

    <div id="view-library" class="page">
        <h2 class="serif text-5xl mb-8 mt-8">Volumes</h2>
        <div id="category-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <p>Loading your collection...</p>
        </div>
    </div>

    <div id="view-folder" class="page hidden">
        <button onclick="showView('library')" class="text-xs font-bold text-stone-400 mb-4">← BACK</button>
        <h2 id="folder-title" class="serif text-4xl mb-8 capitalize"></h2>
        <div id="recipe-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <div id="view-recipe" class="page hidden">
        <button onclick="showView('folder')" class="text-xs font-bold text-stone-400 mb-4">← BACK</button>
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
            <h2 id="r-name" class="serif text-4xl mb-4"></h2>
            <div id="r-meta" class="text-orange-600 text-xs font-bold mb-8"></div>
            <div class="grid md:grid-cols-2 gap-8">
                <div><h3 class="serif font-bold border-b pb-2 mb-4">Ingredients</h3><p id="r-ingredients" style="white-space:pre-wrap"></p></div>
                <div><h3 class="serif font-bold border-b pb-2 mb-4">Directions</h3><p id="r-directions" style="white-space:pre-wrap"></p></div>
            </div>
            <button id="del-btn" class="mt-8 text-red-400 text-xs uppercase font-bold">Delete Recipe</button>
        </div>
    </div>

    <div id="view-form" class="page hidden">
        <h2 class="serif text-3xl mb-8">Add New Recipe</h2>
        <input type="text" id="f-name" placeholder="Recipe Name">
        <input type="text" id="f-cat" placeholder="Category (e.g. Dinner, Desserts)">
        <textarea id="f-ing" rows="5" placeholder="Ingredients"></textarea>
        <textarea id="f-dir" rows="5" placeholder="Directions"></textarea>
        <button onclick="saveRecipe()" class="w-full bg-stone-900 text-white py-4 rounded-xl font-bold">SAVE TO CLOUD</button>
    </div>

    <script>
        var BIN_ID = '69b8a763b7ec241ddc7544fd'; 
        var API_KEY = '$2a$10$wXX01DEUgEg9bg10NJO4.uYws/fNtG.OcNEUKqmg56Qwn3uuQ8t56';
        var URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
        var recipes = [];

        function showView(id) {
            document.getElementById('view-library').classList.add('hidden');
            document.getElementById('view-folder').classList.add('hidden');
            document.getElementById('view-recipe').classList.add('hidden');
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('view-' + id).classList.remove('hidden');
        }

        async function loadData() {
            try {
                var response = await fetch(URL + '/latest', {
                    headers: { 'X-Master-Key': API_KEY }
                });
                var data = await response.json();
                recipes = data.record || [];
                renderLibrary();
            } catch (e) {
                document.getElementById('category-grid').innerHTML = '<p>Error connecting to cloud. Check your Internet.</p>';
            }
        }

        function renderLibrary() {
            var grid = document.getElementById('category-grid');
            if (recipes.length === 0) {
                grid.innerHTML = '<p>No recipes found. Click + New Entry to start.</p>';
                return;
            }
            var categories = [];
            for (var i = 0; i < recipes.length; i++) {
                if (categories.indexOf(recipes[i].category) === -1) {
                    categories.push(recipes[i].category);
                }
            }
            
            var html = '';
            for (var j = 0; j < categories.length; j++) {
                html += '<div class="folder-card" onclick="openFolder(\''+categories[j]+'\')">' +
                        '<h3 class="serif text-2xl capitalize">'+categories[j]+'</h3>' +
                        '</div>';
            }
            grid.innerHTML = html;
        }

        function openFolder(cat) {
            showView('folder');
            document.getElementById('folder-title').innerText = cat;
            var filtered = recipes.filter(function(r) { return r.category === cat; });
            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                html += '<div class="bg-white p-6 rounded-xl border border-stone-100 shadow-sm" onclick="openRecipe('+filtered[i].id+')">' +
                        '<h4 class="serif text-xl">'+filtered[i].name+'</h4>' +
                        '</div>';
            }
            document.getElementById('recipe-grid').innerHTML = html;
        }

        function openRecipe(id) {
            var r = recipes.find(function(x) { return x.id === id; });
            showView('recipe');
            document.getElementById('r-name').innerText = r.name;
            document.getElementById('r-ingredients').innerText = r.ingredients;
            document.getElementById('r-directions').innerText = r.directions;
            document.getElementById('del-btn').onclick = function() { deleteRecipe(id); };
        }

        function openAddForm() {
            showView('form');
        }

        async function saveRecipe() {
            var newR = {
                id: Date.now(),
                name: document.getElementById('f-name').value,
                category: document.getElementById('f-cat').value,
                ingredients: document.getElementById('f-ing').value,
                directions: document.getElementById('f-dir').value
            };
            recipes.push(newR);
            
            await fetch(URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(recipes)
            });
            
            location.reload();
        }

        async function deleteRecipe(id) {
            if(confirm("Delete this recipe?")) {
                recipes = recipes.filter(function(x) { return x.id !== id; });
                await fetch(URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(recipes)
                });
                location.reload();
            }
        }

        loadData();
    </script>
</body>
</html>
