<script>
        const BIN_ID = '69b8a763b7ec241ddc7544fd'; 
        const API_KEY = '$2a$10$wXX01DEUgEg9bg10NJO4.uYws/fNtG.OcNEUKqmg56Qwn3uuQ8t56';
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let recipes = [];

        async function syncCloud(dataToSave = null) {
            const indicator = document.getElementById('sync-indicator');
            indicator.classList.remove('hidden');
            
            try {
                const headers = {
                    'X-Master-Key': API_KEY,
                    'Content-Type': 'application/json',
                    'X-Bin-Meta': 'false' // This simplifies the data we get back
                };

                if (dataToSave) {
                    // FORCE SAVE TO CLOUD
                    const response = await fetch(URL, {
                        method: 'PUT',
                        headers: headers,
                        body: JSON.stringify(dataToSave)
                    });
                    if (!response.ok) throw new Error('Save failed');
                    recipes = dataToSave;
                } else {
                    // FORCE LOAD FROM CLOUD
                    const response = await fetch(URL + '/latest', {
                        method: 'GET',
                        headers: headers
                    });
                    if (!response.ok) throw new Error('Load failed');
                    const result = await response.json();
                    
                    // This line handles the data whether the bin is public OR private
                    recipes = Array.isArray(result) ? result : (result.record || []);
                }
                renderLibrary();
            } catch (e) {
                console.error("Cloud Error:", e);
                // If cloud fails, look at the phone/computer's own memory
                recipes = JSON.parse(localStorage.getItem('grisafe_backup') || '[]');
                renderLibrary();
            }
            indicator.classList.add('hidden');
        }

        // ... Keep all your other functions (navigateTo, renderLibrary, etc.) exactly the same ...
        
        // Make sure to call syncCloud() at the very end to start the app
        syncCloud();
    </script>
