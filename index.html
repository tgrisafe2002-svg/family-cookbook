<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grisafe Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfcfb; color: #1c1917; }
        .serif { font-family: 'Playfair Display', serif; }
        .hidden { display: none !important; }
        .card { background: white; border: 1px solid #e7e5e4; padding: 2rem; border-radius: 1.5rem; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: #c2410c; transform: translateY(-2px); }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-200 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="serif text-xl font-bold italic" onclick="location.reload()" style="cursor:pointer">The Grisafe Collection</h1>
            <button onclick="showView('form')" class="bg-stone-900 text-white px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest">+ New Entry</button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-6 py-10">
        <div id="view-library">
            <h2 class="serif text-5xl mb-10">Volumes</h2>
            <div id="category-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <p class="text-stone-400">Loading collection...</p>
            </div>
        </div>

        <div id="view-folder" class="hidden">
            <button onclick="showView('library')" class="text-xs font-bold text-stone-400 mb-6 uppercase">← Back to Library</button>
            <h2 id="folder-title" class="serif text-4xl mb-8 capitalize"></h2>
            <div id="recipe-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <div id="view-recipe" class="hidden">
            <button onclick="showView('folder')" class="text-xs font-bold text-stone-400 mb-6 uppercase">← Back to Volume</button>
            <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-sm border border-stone-100">
                <h2 id="r-name" class="serif text-4xl mb-6"></h2>
                <div class="grid md:grid-cols-2 gap-10">
                    <div>
                        <h3 class="serif font-bold border-b pb-2 mb-4">Ingredients</h3>
                        <p id="r-ing" class="whitespace-pre-wrap text-stone-600 leading-relaxed"></p>
                    </div>
                    <div>
                        <h3 class="serif font-bold border-b pb-2 mb-4">Directions</h3>
                        <p id="r-dir" class="whitespace-pre-wrap text-stone-700 leading-relaxed"></p>
                    </div>
                </div>
                <button id="del-btn" class="mt-12 text-red-400 text-[10px] font-bold uppercase tracking-widest hover:text-red-600">Delete Recipe</button>
            </div>
        </div>

        <div id="view-form" class="hidden">
            <h2 class="serif text-3xl mb-8">New Recipe Entry</h2>
            <div class="space-y-4">
                <input type="text" id="f-name" placeholder="Recipe Name" class="w-full p-4 border rounded-xl">
                <input type="text" id="f-cat" placeholder="Category (e.g. Italian, Desserts)" class="w-full p-4 border rounded-xl">
                <textarea id="f-ing" rows="6" placeholder="Ingredients..." class="w-full p-4 border rounded-xl"></textarea>
                <textarea id="f-dir" rows="6" placeholder="Directions..." class="w-full p-4 border rounded-xl"></textarea>
                <button onclick="saveRecipe()" id="save-btn" class="w-full bg-stone-900 text-white py-5 rounded-xl font-bold uppercase tracking-widest text-sm">Save to Cloud</button>
                <button onclick="showView('library')" class="w-full text-stone-400 text-xs font-bold py-2">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const BIN_ID = '69b8a763b7ec241ddc7544fd';
        const API_KEY = '$2a$10$wXX01DEUgEg9bg10NJO4.uYws/fNtG.OcNEUKqmg56Qwn3uuQ8t56';
        const URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
        
        let recipes = [];
        let currentRecipeId = null;

        function showView(viewId) {
            ['library', 'folder', 'recipe', 'form'].forEach(v => {
                document.getElementById('view-' + v).classList.add('hidden');
            });
            document.getElementById('view-' + viewId).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        async function loadData() {
            try {
                const response = await fetch(URL + '/latest', {
                    headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': 'false' }
                });
                const data = await response.json();
                recipes = Array.isArray(data) ? data : (data.record || []);
                renderLibrary();
            } catch (e) {
                document.getElementById('category-grid').innerHTML = "Connection error. Refresh the page.";
            }
        }

        function renderLibrary() {
            const grid = document.getElementById('category-grid');
            if (recipes.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-10 text-stone-400 italic">No recipes found. Add your first one!</div>';
                return;
            }
            const categories = [...new Set(recipes.map(r => r.category))].sort();
            grid.innerHTML = categories.map(cat => `
                <div class="card" onclick="openFolder('${cat}')">
                    <h3 class="serif text-2xl font-bold capitalize">${cat}</h3>
                    <p class="text-[10px] font-bold text-orange-600 uppercase mt-2">${recipes.filter(r => r.category === cat).length} Recipes</p>
                </div>
            `).join('');
        }

        function openFolder(cat) {
            showView('folder');
            document.getElementById('folder-title').innerText = cat;
            const filtered = recipes.filter(r => r.category === cat);
            document.getElementById('recipe-grid').innerHTML = filtered.map(r => `
                <div class="card !p-6" onclick="openRecipe(${r.id})">
                    <h4 class="serif text-xl">${r.name}</h4>
                </div>
            `).join('');
        }

        function openRecipe(id) {
            const r = recipes.find(x => x.id === id);
            currentRecipeId = id;
            showView('recipe');
            document.getElementById('r-name').innerText = r.name;
            document.getElementById('r-ing').innerText = r.ingredients;
            document.getElementById('r-dir').innerText = r.directions;
            document.getElementById('del-btn').onclick = deleteRecipe;
        }

        async function saveRecipe() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "SYNCING...";
            btn.disabled = true;

            const newRecipe = {
                id: Date.now(),
                name: document.getElementById('f-name').value,
                category: document.getElementById('f-cat').value,
                ingredients: document.getElementById('f-ing').value,
                directions: document.getElementById('f-dir').value
            };

            if(!newRecipe.name || !newRecipe.category) {
                alert("Please fill in Name and Category");
                btn.innerText = "SAVE TO CLOUD";
                btn.disabled = false;
                return;
            }

            recipes.push(newRecipe);

            try {
                await fetch(URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(recipes)
                });
                location.reload();
            } catch (e) {
                alert("Cloud error. Recipe not saved.");
                btn.innerText = "SAVE TO CLOUD";
                btn.disabled = false;
            }
        }

        async function deleteRecipe() {
            if(!confirm("Delete this recipe?")) return;
            recipes = recipes.filter(r => r.id !== currentRecipeId);
            await fetch(URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(recipes)
            });
            location.reload();
        }

        // Run on start
        loadData();
    </script>
</body>
</html>
